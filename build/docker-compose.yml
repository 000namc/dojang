services:
  app:
    build:
      context: ..
      dockerfile: build/app/Dockerfile
    container_name: dojang-app
    ports:
      - "8010:8010"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - dojang-data:/app/data
      # 백엔드 코드 bind mount → uvicorn --reload 로 핫리로드
      - ../src/backend:/app/src/backend
      # 호스트의 claude 자격증명 + 세션 jsonl 공유.
      # ~/.claude/ (디렉토리: 세션·플러그인·hooks) + ~/.claude.json (config 파일) 둘 다 필요.
      - ${HOME}/.claude:/root/.claude
      - ${HOME}/.claude.json:/root/.claude.json
    depends_on:
      dojang-sql:
        condition: service_healthy
    command: ["uv", "run", "uvicorn", "src.backend.main:app", "--host", "0.0.0.0", "--port", "8010", "--reload"]

  dojang-cli:
    build: ./cli
    container_name: dojang-cli

  dojang-git:
    build: ./git
    container_name: dojang-git

  dojang-docker:
    build: ./docker
    container_name: dojang-docker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  dojang-sql:
    build: ./sql
    container_name: dojang-sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pdojang"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  dojang-data:
