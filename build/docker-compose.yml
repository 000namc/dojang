services:
  app:
    profiles: ["prod"]
    build:
      context: ..
      dockerfile: build/app/Dockerfile
    container_name: dojang-app
    ports:
      - "8010:8010"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - dojang-data:/app/data
    depends_on:
      dojang-sql:
        condition: service_healthy
    env_file:
      - ../.env

  dojang-cli:
    build: ./cli
    container_name: dojang-cli

  dojang-git:
    build: ./git
    container_name: dojang-git

  dojang-docker:
    build: ./docker
    container_name: dojang-docker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  dojang-python:
    build: ./python
    container_name: dojang-python

  dojang-sql:
    build: ./sql
    container_name: dojang-sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pdojang"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  dojang-data:
