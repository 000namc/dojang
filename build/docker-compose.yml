services:
  app:
    build:
      context: ..
      dockerfile: build/app/Dockerfile
    container_name: dojang-app
    ports:
      - "8010:8010"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # 학습자 데이터 (dojang.db, current_context.md 등) 는 호스트 data/ 에 직접
      # 보이게 bind mount — Finder/git status/Time Machine 에서 즉시 확인 가능하고
      # 백업도 디렉토리 복사로 끝남. 도커 볼륨에 숨겨두면 실수로 down -v 한 방에
      # 학습 이력이 전부 사라진다.
      - ../data:/app/data
      # 백엔드 코드 bind mount → uvicorn --reload 로 핫리로드
      - ../src/backend:/app/src/backend
      # 프론트엔드 빌드 결과물 bind mount — 이미지에 구워넣지 않고 호스트에서
      # `npm run build` (또는 `vite build --watch`) 돌린 결과를 바로 반영한다.
      # `dist/` 는 gitignored 라 커밋 대상 아님. 첫 실행 전에 반드시 한 번은
      # 빌드해둬야 디렉토리가 존재함 (없으면 compose 가 빈 디렉토리를 생성 → 404).
      - ../src/frontend/dist:/app/static
      # 호스트의 claude 세션 + 자격증명 공유 (~/.claude/.credentials.json 등).
      # 단 ~/.claude.json (config 파일) 은 마운트하지 않음 — 호스트 macOS 의
      # installMethod=native + atomic-rewrite 가 컨테이너에서 corrupt 로 보이는
      # race condition 을 일으키고, OS-specific 설정이 mismatch 됨. 컨테이너는
      # 자체 .claude.json 을 아래 dojang-claude-config 볼륨에 영속화한다
      # (/app/claude-config/claude.json → /root/.claude.json symlink, Dockerfile 참고).
      - ${HOME}/.claude:/root/.claude
      - dojang-claude-config:/app/claude-config
      # gh CLI 자격증명 영속화 — `gh auth login` 으로 받은 OAuth 토큰이
      # 컨테이너 재시작 / 재빌드 후에도 유지되도록 named volume 사용.
      # 호스트 ~/.config/gh 를 직접 마운트하지 않는 이유는 (a) macOS 사용자가
      # 호스트에서 gh 를 안 쓰는 경우가 많고, (b) 컨테이너의 OAuth flow 와
      # 호스트의 OAuth flow 가 충돌할 수 있어서. claude-config 와 같은 패턴.
      - dojang-gh-config:/root/.config/gh
    depends_on:
      dojang-sql:
        condition: service_healthy
    command: ["uv", "run", "uvicorn", "src.backend.main:app", "--host", "0.0.0.0", "--port", "8010", "--reload"]

  dojang-cli:
    build: ./cli
    container_name: dojang-cli

  dojang-git:
    build: ./git
    container_name: dojang-git

  dojang-docker:
    build: ./docker
    container_name: dojang-docker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  dojang-sql:
    build: ./sql
    container_name: dojang-sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pdojang"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  dojang-claude-config:
  dojang-gh-config:
